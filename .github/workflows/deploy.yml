name: Deploy to Tencent COS

# 等价于原 .cnb.yml：push 到 master 时构建并上传 dist/ 到腾讯云 COS
on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  COS_BUCKET: resource-game-1307257815
  COS_REGION: ap-chengdu

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        run: |
          # npm 网络偶发 ECONNRESET，加重试与超时
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

      - name: Install coscli
        run: |
          # 取最新 release 的 linux-amd64 资产（资产名形如 coscli-vX.Y.Z-linux-amd64）
          url=$(curl -fsSL https://api.github.com/repos/tencentyun/coscli/releases/latest \
            | grep -o 'https://[^"]*linux-amd64' | head -1)
          echo "Downloading $url"
          curl -fsSL -o coscli "$url"
          chmod +x coscli
          sudo mv coscli /usr/local/bin/coscli
          coscli --version || true

      - name: Upload dist/ to COS
        env:
          TC_SECRET_ID: ${{ secrets.TC_SECRET_ID }}
          TC_SECRET_KEY: ${{ secrets.TC_SECRET_KEY }}
        run: |
          coscli config set --secret_id "$TC_SECRET_ID" --secret_key "$TC_SECRET_KEY"
          coscli config add --init-skip=true -b "$COS_BUCKET" -r "$COS_REGION"

          # 部署顺序很重要，避免部署期白屏：
          # 1) 先传 assets 等带哈希的静态资源（长缓存）。此时旧 index.html 仍指向旧资源，
          #    旧资源还在 COS（cp 不删旧文件），用户访问不受影响。
          # 2) 最后传 index.html / 404.html，并设 no-cache，让边缘和浏览器每次校验，
          #    部署完成后用户立刻拿到指向新资源的新 index.html。
          # 这样 index.html 引用的新资源必定已存在，且入口 HTML 不被 30 天长缓存。

          # 先传除 html 外的所有内容（assets、图片等），长缓存
          # 注意：coscli 的 --include/--exclude 用正则(非 glob)，--meta 多个头用 # 分隔
          coscli cp ./dist/ "cos://${COS_BUCKET}/" -r \
            --exclude ".*\.html$" \
            --meta="Cache-Control:public,max-age=31536000,immutable"

          # 再单独传 html 入口文件，禁缓存
          coscli cp ./dist/ "cos://${COS_BUCKET}/" -r \
            --include ".*\.html$" \
            --meta="Cache-Control:no-cache,no-store,must-revalidate"
