name: Deploy to Demox (self-hosted)

# 自托管部署：构建 dist/ 后，用 Demox 自己的 /deploy 接口原地更新站点 EPX2UU43。
# 取代原 coscli→COS 流程。鉴权用长期 CI token(DEMOX_TOKEN)，详见仓库 Secrets。
on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  # 被 demox 平台托管的「demox 主站」自身的站点 ID（固定，原地更新）
  WEBSITE_ID: EPX2UU43
  WEBSITE_NAME: demox-site
  # website-api 的 /deploy 端点（与 cli 默认 cloudFunctionUrl 一致）
  DEPLOY_URL: ${{ vars.DEMOX_DEPLOY_URL }}
  VITE_DEMOX_API_URL: ${{ vars.VITE_DEMOX_API_URL }}
  VITE_DEMOX_SITE_URL: ${{ vars.VITE_DEMOX_SITE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        run: |
          : "${VITE_DEMOX_API_URL:?请在 GitHub Actions Variables 中配置 VITE_DEMOX_API_URL}"
          : "${VITE_DEMOX_SITE_URL:?请在 GitHub Actions Variables 中配置 VITE_DEMOX_SITE_URL}"
          # npm 网络偶发 ECONNRESET，加重试与超时
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

      - name: Deploy dist/ via Demox API
        env:
          DEMOX_TOKEN: ${{ secrets.DEMOX_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DEMOX_TOKEN:-}" ]; then
            echo "::error::缺少 DEMOX_TOKEN secret"; exit 1
          fi

          # 1) 打包 dist/（zip 根 = dist 内容，与 cli deploy 一致）
          ( cd dist && zip -qr /tmp/deploy.zip . )
          echo "zip size: $(du -h /tmp/deploy.zip | cut -f1)"

          # 2) 组装 JSON：fileContentBase64 + fileName + websiteId（原地更新）
          #    用 node 生成，避免 base64 换行与 shell 转义问题
          node -e '
            const fs = require("fs");
            const b = fs.readFileSync("/tmp/deploy.zip").toString("base64");
            const payload = {
              fileContentBase64: b,
              fileName: process.env.WEBSITE_NAME,
              websiteId: process.env.WEBSITE_ID,
            };
            fs.writeFileSync("/tmp/deploy.json", JSON.stringify(payload));
          '

          # 3) 调 /deploy。-f 让 HTTP 错误码非零退出；响应里再校验 success
          : "${DEPLOY_URL:?请在 GitHub Actions Variables 中配置 DEMOX_DEPLOY_URL}"
          resp=$(curl -fsS -m 120 -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEMOX_TOKEN" \
            --data-binary @/tmp/deploy.json)
          echo "API 响应: $resp"

          echo "$resp" | node -e '
            let s = ""; process.stdin.on("data", d => s += d);
            process.stdin.on("end", () => {
              let j; try { j = JSON.parse(s); } catch (e) { console.error("响应非 JSON"); process.exit(1); }
              if (!j.success) { console.error("部署失败:", j.message || j.error || s); process.exit(1); }
              console.log("✅ 部署成功:", j.url);
            });
          '
