<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP API Proxy</title>
</head>
<body>
  <div id="result">Loading...</div>
  <script src="https://cdn.cloudbase.net/cloudbase.full.js"></script>
  <script>
    // 从 URL 查询参数获取请求数据
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get('action') || 'exchange_token';
    const code = urlParams.get('code');
    const clientId = urlParams.get('client_id');
    const redirectUri = urlParams.get('redirect_uri');

    // 显示请求信息
    document.getElementById('result').textContent = '正在处理...';

    // 初始化 CloudBase
    const app = cloudbase.init({
      env: 'moyu-3g5pbxld00f4aead'
    });

    // 调用云函数
    app.callFunction({
      name: 'oauth-token-manager',
      data: {
        action,
        code,
        clientId,
        redirectUri,
      },
    }).then(res => {
      const result = res.result;
      // 返回 JSON 响应
      document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
    }).catch(err => {
      // 返回错误
      document.getElementById('result').innerHTML = '<pre>' + JSON.stringify({
        error: {
          code: 'FUNCTION_CALL_FAILED',
          message: err.message || '云函数调用失败'
        }
      }, null, 2) + '</pre>';
    });
  </script>
</body>
</html>
