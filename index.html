<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demox</title>
    <script>
      // Rewrite the real-path GitHub OAuth callback into the app's hash route,
      // before React boots. GitHub can't redirect to a URL fragment, so it lands
      // on /github-callback?code=...; convert it to /#/github-callback?...
      (function () {
        try {
          if (window.location.pathname.indexOf("/github-callback") !== -1) {
            var search = window.location.search || "";
            window.location.replace(
              window.location.origin + "/#/github-callback" + search
            );
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Apply the persisted/system theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("app_theme");
          var theme = saved === "light" || saved === "dark" || saved === "system" ? saved : "system";
          var dark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
